<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clinic — patient management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:ital,opsz@1,6..72&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- LOGIN VIEW -->
    <div id="login-view" class="login-split">
      <aside class="login-aside">
        <div class="brand brand-light">
          <span class="brand-mark"></span>
          <span>Northside Clinic</span>
        </div>

        <figure class="quote">
          <!-- Swap this line for any quote you like -->
          <blockquote>Everybody lies.</blockquote>
          <figcaption>— Dr. Gregory House, <cite>House M.D.</cite></figcaption>
        </figure>

        <p class="aside-foot">Patient management system</p>
      </aside>

      <div class="login-main">
        <div class="login-card">
          <h1>Staff sign in</h1>
          <p class="muted">Practice project — use test credentials only.</p>
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="username" placeholder="nurse@clinic.test" />
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" />
          <button id="login-btn" class="primary">Sign in</button>
          <p id="login-error" class="error"></p>
        </div>
      </div>
    </div>

    <!-- APP SHELL -->
    <div id="app-view" class="hidden">
      <header class="topbar">
        <div class="topbar-left">
          <div class="brand" role="button" id="home-link">
            <span class="brand-mark"></span>
            <span>Northside Clinic</span>
          </div>
          <nav class="nav">
            <button class="nav-link" id="nav-dashboard">Dashboard</button>
            <button class="nav-link" id="nav-patients">Patients</button>
          </nav>
        </div>
        <div class="topbar-right">
          <span id="who" class="muted"></span>
          <button id="logout-btn" class="ghost">Sign out</button>
        </div>
      </header>

      <main id="main"></main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
